<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Tracker Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f8fafc;
    }

    header p {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 4px;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      padding: 0.5rem 1.25rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #btn-analyze {
      background: #6366f1;
      color: white;
    }

    #btn-analyze:hover:not(:disabled) { background: #4f46e5; }

    #btn-refresh {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
    }

    #btn-refresh:hover:not(:disabled) { background: #273244; }

    select {
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #94a3b8;
      font-size: 0.875rem;
      cursor: pointer;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat {
      background: #1e293b;
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 600;
      color: #f1f5f9;
    }

    #status {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 1.25rem;
      min-height: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #273244;
      border-radius: 12px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card-company {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
    }

    .card-role {
      font-size: 1rem;
      font-weight: 600;
      color: #f1f5f9;
      line-height: 1.3;
    }

    .card-meta {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 99px;
      border: 1px solid #334155;
      color: #94a3b8;
    }

    .divider {
      border: none;
      border-top: 1px solid #273244;
    }

    .ai-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #475569;
      margin-bottom: 6px;
    }

    .score-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .score-bar-bg {
      flex: 1;
      height: 5px;
      background: #0f1117;
      border-radius: 99px;
      overflow: hidden;
    }

    .score-bar {
      height: 100%;
      border-radius: 99px;
      transition: width 0.6s ease;
    }

    .score-high { background: #22c55e; }
    .score-mid  { background: #f59e0b; }
    .score-low  { background: #ef4444; }

    .score-num {
      font-size: 0.85rem;
      font-weight: 600;
      color: #f1f5f9;
      min-width: 36px;
      text-align: right;
    }

    .resume-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 6px;
    }

    .badge-swe  { background: #1e3a5f; color: #60a5fa; }
    .badge-mle  { background: #14532d; color: #4ade80; }
    .badge-both { background: #451a03; color: #fbbf24; }

    .reasoning {
      font-size: 0.8rem;
      color: #64748b;
      line-height: 1.5;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 0.5rem;
      border-top: 1px solid #273244;
      margin-top: auto;
    }

    .status-select {
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #0f1117;
      color: #94a3b8;
      cursor: pointer;
    }

    .apply-btn {
      font-size: 0.75rem;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: transparent;
      color: #94a3b8;
      text-decoration: none;
      cursor: pointer;
    }

    .apply-btn:hover { background: #273244; color: #f1f5f9; }

    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem;
      color: #475569;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Job Tracker Agent</h1>
    <p>New grad listings · Scored by ModernBERT semantic similarity</p>
  </div>
  <div class="controls">
    <select id="filter">
      <option value="all">All roles</option>
      <option value="swe">SWE resume</option>
      <option value="mle">MLE resume</option>
      <option value="high">High fit (70+)</option>
    </select>
    <button id="btn-refresh">Load results</button>
    <button id="btn-analyze">Run agent</button>
  </div>
</header>

<div class="stats">
  <div class="stat"><div class="stat-label">Jobs fetched</div><div class="stat-value" id="st-total">0</div></div>
  <div class="stat"><div class="stat-label">High fit</div><div class="stat-value" id="st-high">0</div></div>
  <div class="stat"><div class="stat-label">SWE roles</div><div class="stat-value" id="st-swe">0</div></div>
  <div class="stat"><div class="stat-label">MLE roles</div><div class="stat-value" id="st-mle">0</div></div>
</div>

<div id="status">Click "Load results" to view analyzed jobs, or "Run agent" to fetch and analyze fresh listings.</div>
<div class="grid" id="grid"><div class="empty">No jobs loaded yet.</div></div>

<script>
  let allJobs = [];

  function scoreClass(s) {
    if (s >= 70) return "score-high";
    if (s >= 45) return "score-mid";
    return "score-low";
  }

  function badgeClass(r) {
    if (!r) return "badge-swe";
    const v = r.toLowerCase();
    if (v === "mle") return "badge-mle";
    if (v === "either") return "badge-both";
    return "badge-swe";
  }

  function badgeLabel(r) {
    if (!r) return "SWE resume";
    if (r.toLowerCase() === "mle") return "MLE resume";
    if (r.toLowerCase() === "either") return "Either resume";
    return "SWE resume";
  }

  function updateStats(jobs) {
    document.getElementById("st-total").textContent = jobs.length;
    document.getElementById("st-high").textContent = jobs.filter(j => j.score >= 70).length;
    document.getElementById("st-swe").textContent = jobs.filter(j => (j.resume || "").toLowerCase() === "swe").length;
    document.getElementById("st-mle").textContent = jobs.filter(j => (j.resume || "").toLowerCase() === "mle").length;
  }

  function renderGrid() {
    const filter = document.getElementById("filter").value;
    const grid = document.getElementById("grid");

    let jobs = allJobs;
    if (filter === "swe") jobs = jobs.filter(j => (j.resume || "").toLowerCase() === "swe");
    if (filter === "mle") jobs = jobs.filter(j => (j.resume || "").toLowerCase() === "mle");
    if (filter === "high") jobs = jobs.filter(j => j.score >= 70);

    if (jobs.length === 0) {
      grid.innerHTML = '<div class="empty">No jobs match this filter.</div>';
      return;
    }

    grid.innerHTML = jobs.map(j => `
      <div class="card">
        <div>
          <div class="card-company">${j.company}</div>
          <div class="card-role">${j.role}</div>
          <div class="card-meta">
            <span class="tag">${j.location || "Remote"}</span>
          </div>
        </div>
        <hr class="divider">
        <div>
          <div class="ai-label">ModernBERT similarity score</div>
          <div class="score-row">
            <div class="score-bar-bg">
              <div class="score-bar ${scoreClass(j.score)}" style="width:${j.score}%"></div>
            </div>
            <span class="score-num">${j.score}%</span>
          </div>
          <div style="margin: 8px 0;">
            <span class="resume-badge ${badgeClass(j.resume)}">${badgeLabel(j.resume)}</span>
          </div>
          <div class="reasoning">${j.reasoning}</div>
        </div>
        <div class="card-footer">
          <select class="status-select" onchange="updateStatus('${j.id}', this.value)">
            <option value="not-applied">Not applied</option>
            <option value="applied">Applied</option>
            <option value="interview">Interview</option>
            <option value="rejected">Rejected</option>
            <option value="offer">Offer</option>
          </select>
          <a href="${j.url}" class="apply-btn" target="_blank">Apply</a>
        </div>
      </div>
    `).join("");
  }

  async function loadResults() {
    document.getElementById("status").textContent = "Loading results...";
    try {
      const res = await fetch("/results");
      const data = await res.json();
      allJobs = data.analyzed || [];
      updateStats(allJobs);
      renderGrid();
      document.getElementById("status").textContent = `Loaded ${allJobs.length} jobs from last agent run.`;
    } catch (e) {
      document.getElementById("status").textContent = "Error loading results.";
    }
  }

  async function runAgent() {
    const btn = document.getElementById("btn-analyze");
    btn.disabled = true;
    btn.textContent = "Running...";
    document.getElementById("status").textContent = "Agent running — fetching and analyzing jobs...";
    try {
      const res = await fetch("/analyze", { method: "POST" });
      const data = await res.json();
      allJobs = data.analyzed || [];
      updateStats(allJobs);
      renderGrid();
      document.getElementById("status").textContent = `Done — ${allJobs.length} jobs analyzed.`;
    } catch (e) {
      document.getElementById("status").textContent = "Error running agent.";
    }
    btn.disabled = false;
    btn.textContent = "Run agent";
  }

  document.getElementById("btn-refresh").addEventListener("click", loadResults);
  document.getElementById("btn-analyze").addEventListener("click", runAgent);
  document.getElementById("filter").addEventListener("change", renderGrid);
</script>
</body>
</html>
